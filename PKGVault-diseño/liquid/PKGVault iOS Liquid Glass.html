<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8" />
<title>PKGVault · iOS Liquid Glass</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { --bg: #06040b; --ink: #f4f1ec; --accent: #ff7a59; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; }
  #root { width: 100vw; min-height: 100vh; }
  * { box-sizing: border-box; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  /* Wallpapers behind glass */
  .wp { position: absolute; inset: 0; }
  .wp-aurora {
    background:
      radial-gradient(ellipse 60% 40% at 18% 22%, rgba(124,76,255,.9)  0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 82% 18%, rgba(255,93,148,.75) 0%, transparent 65%),
      radial-gradient(ellipse 55% 40% at 28% 80%, rgba(60,200,255,.8)  0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 78% 86%, rgba(255,170,60,.6)  0%, transparent 65%),
      #0a0610;
  }
  .wp-peach {
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(255,180,140,1)  0%, transparent 60%),
      radial-gradient(ellipse 55% 40% at 85% 30%, rgba(255,120,140,.9) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 90%, rgba(120,140,255,.8) 0%, transparent 60%),
      #1a0d18;
  }
  .wp-ocean {
    background:
      radial-gradient(ellipse 60% 50% at 30% 30%, rgba(40,120,255,.95) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 75% 70%, rgba(80,255,200,.75) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(180,80,255,.55) 0%, transparent 70%),
      #03081a;
  }
  .wp-grid {
    background:
      radial-gradient(circle at 50% 30%, rgba(255,120,80,.6)  0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(80,255,180,.45) 0%, transparent 50%),
      #06080c;
  }
  .wp-grid::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  /* CSS-fallback glass (used while liquid-glass-react boots, and as a styling helper) */
  .glass-fallback {
    background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.04));
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,.16);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 8px 24px rgba(0,0,0,.3);
  }

  /* Hide scrollbars in scroll regions */
  .scroll::-webkit-scrollbar { display: none; }
  .scroll { scrollbar-width: none; }

  .row:hover { background: rgba(255,255,255,.05); }
  .row:active { background: rgba(255,255,255,.12); }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel pinned (per house rules) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Load liquid-glass-react as ESM (it's an esm.sh-hosted React component) and expose to window -->
  <script type="module">
    try {
      const mod = await import("https://esm.sh/liquid-glass-react@1.1.1?deps=react@18.3.1,react-dom@18.3.1&bundle");
      window.LiquidGlass = mod.default || mod.LiquidGlass || mod;
    } catch (e) {
      console.warn("liquid-glass-react failed to load, falling back to CSS glass", e);
      window.LiquidGlass = null;
    }
    window.dispatchEvent(new Event("lg-ready"));
  </script>

  <script type="text/babel" data-presets="react" src="lg-bundle.jsx"></script>
</body>
</html>
