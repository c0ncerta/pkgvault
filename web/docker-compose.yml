# Pin the Compose project name so volumes stay `backend_*` regardless of the
# directory name (the folder was renamed from `backend/` to `web/`).
name: backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: pkgvault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pkgvault
      POSTGRES_PASSWORD: pkgvault_dev
      POSTGRES_DB: pkgvault
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkgvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pkgvault-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
