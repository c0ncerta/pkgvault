# Pin the Compose project name so volumes stay `backend_*` regardless of the
# directory name (the folder was renamed from `backend/` to `web/`).
name: backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: pkgvault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pkgvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env)}
      POSTGRES_DB: pkgvault
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkgvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pkgvault-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: pkgvault-prowlarr
    restart: unless-stopped
    # Route Prowlarr through the VPN too, so its direct indexer connections
    # (not just FlareSolverr) exit via Mullvad. Reachable at gluetun:9696.
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
    volumes:
      - prowlarrdata:/config

  # VPN egress (Mullvad/WireGuard). FlareSolverr routes through this so its
  # requests to geo/IP-blocked indexers (RuTracker) exit via the VPN. gluetun
  # is kill-switch by default: if the tunnel drops, no traffic leaks.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: pkgvault-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER:?set in .env}
      VPN_TYPE: ${VPN_TYPE:-wireguard}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY:?set in .env}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES:?set in .env}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES:-Netherlands}
      BLOCK_MALICIOUS: "on"
      TZ: Etc/UTC
    ports:
      # Prowlarr (9696) and FlareSolverr (8191) share gluetun's network.
      - "127.0.0.1:9696:9696"
      - "127.0.0.1:8191:8191"

  # Solves Cloudflare challenges for indexers that need it (e.g. RuTracker).
  # Routed through gluetun so its egress is the VPN, not the host IP.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: pkgvault-flaresolverr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      LOG_LEVEL: info
      TZ: Etc/UTC

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: https://www.pkgvault.fun
    container_name: pkgvault-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pkgvault:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env)}@postgres:5432/pkgvault
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  prowlarrdata:
